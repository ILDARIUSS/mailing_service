<!-- mailings/templates/mailings/dashboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailing Dashboard</title>
</head>
<body>
    <h1>Mailing Dashboard</h1>

    <h2>Statistics</h2>
    <ul>
        <li><strong>Unique Recipients:</strong> {{ unique_recipients }}</li>
        <li><strong>Active Mailings:</strong> {{ active_mailings.count }}</li>
        <li><strong>Total Mailings:</strong> {{ total_mailings }}</li>
    </ul>

    <h2>Active Mailings</h2>
    <ul>
        {% for mailing in active_mailings %}
            <li>{{ mailing.name }} - Status: {{ mailing.status }}</li>
        {% endfor %}
    </ul>

</body>
</html>
